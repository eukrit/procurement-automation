steps:
  # Service 1: Send RFQ (HTTP trigger)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - send-rfq
      - --gen2
      - --runtime=python312
      - --region=us-central1
      - --source=.
      - --entry-point=send_rfq
      - --trigger-http
      - --allow-unauthenticated
      - --memory=512Mi
      - --timeout=300s
      - --set-env-vars=GCP_PROJECT=ai-agents-go,FIRESTORE_DATABASE=procurement-automation,IMPERSONATE_USER=eukrit@goco.bz,USE_GMAIL_ROUTER=false
      - --set-secrets=GOOGLE_APPLICATION_CREDENTIALS=gmail-service-account:latest

  # Service 2: Process inbound emails (Pub/Sub) — Phase 3
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - process-procurement-email
      - --gen2
      - --runtime=python312
      - --region=us-central1
      - --source=.
      - --entry-point=process_procurement_email
      - --trigger-topic=gmail-procurement-watch
      - --memory=512Mi
      - --timeout=120s
      - --set-env-vars=GCP_PROJECT=ai-agents-go,FIRESTORE_DATABASE=procurement-automation,IMPERSONATE_USER=eukrit@goco.bz,USE_GMAIL_ROUTER=false,SLACK_CHANNEL=C08VD9PRSCU,GEMINI_ENABLED=true
      - --set-secrets=SLACK_BOT_TOKEN=slack-bot-token:latest,GOOGLE_APPLICATION_CREDENTIALS=gmail-service-account:latest

  # Service 2b: Bridge subscriber (Pub/Sub gmail-classified-events from data-communications)
  # Starts in dry-run mode. Flip BRIDGE_DRY_RUN=false and decommission `process-procurement-email`
  # together once 7 days of clean dry-run observation pass — see CHANGELOG.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - process-classified-event
      - --gen2
      - --runtime=python312
      - --region=us-central1
      - --source=.
      - --entry-point=process_classified_event
      - --trigger-topic=gmail-classified-events
      - --memory=512Mi
      - --timeout=120s
      - --set-env-vars=GCP_PROJECT=ai-agents-go,FIRESTORE_DATABASE=procurement-automation,IMPERSONATE_USER=eukrit@goco.bz,USE_GMAIL_ROUTER=false,SLACK_CHANNEL=C08VD9PRSCU,GEMINI_ENABLED=true,BRIDGE_DRY_RUN=true
      - --set-secrets=SLACK_BOT_TOKEN=slack-bot-token:latest,GOOGLE_APPLICATION_CREDENTIALS=gmail-service-account:latest

  # Service 3: Reminder cron (HTTP, invoked by Cloud Scheduler) — Phase 4
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - functions
      - deploy
      - rfq-reminder-cron
      - --gen2
      - --runtime=python312
      - --region=us-central1
      - --source=.
      - --entry-point=rfq_reminder_cron
      - --trigger-http
      - --allow-unauthenticated
      - --memory=256Mi
      - --timeout=120s
      - --set-env-vars=GCP_PROJECT=ai-agents-go,FIRESTORE_DATABASE=procurement-automation,SLACK_CHANNEL=C08VD9PRSCU,USE_GMAIL_ROUTER=false
      - --set-secrets=SLACK_BOT_TOKEN=slack-bot-token:latest,GOOGLE_APPLICATION_CREDENTIALS=gmail-service-account:latest
